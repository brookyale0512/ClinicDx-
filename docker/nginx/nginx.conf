worker_processes auto;
error_log stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format json_combined escape=json
        '{'
            '"ts":"$time_iso8601",'
            '"level":"INFO",'
            '"service":"nginx",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"request_time_ms":$request_time,'
            '"upstream":"$upstream_addr",'
            '"upstream_response_time_ms":"$upstream_response_time",'
            '"remote_addr":"$remote_addr",'
            '"http_trace_id":"$http_x_trace_id"'
        '}';

    access_log /dev/stdout json_combined;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;

    upstream middleware_backend {
        server middleware:8080;
        keepalive 16;
    }

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;
        http2 on;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # ClinicDx engine API
        location /clinicdx-api/ {
            rewrite ^/clinicdx-api/(.*)$ /$1 break;
            proxy_pass         http://middleware_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_set_header   X-Trace-Id        $http_x_trace_id;
            proxy_connect_timeout 10s;
            proxy_read_timeout    180s;
            proxy_send_timeout    30s;
        }

        # SSE streaming (no buffering)
        location /clinicdx-api/cds/generate_stream {
            rewrite ^/clinicdx-api/(.*)$ /$1 break;
            proxy_pass         http://middleware_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_set_header   X-Trace-Id        $http_x_trace_id;
            proxy_buffering          off;
            proxy_cache              off;
            add_header               X-Accel-Buffering no;
            proxy_read_timeout       300s;
            proxy_connect_timeout    10s;
        }

        # Static frontend files
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
