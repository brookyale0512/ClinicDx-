# =============================================================================
# ClinicDx — CDS Engine (Component 1)
# =============================================================================
# The standalone AI engine: model inference + knowledge base + CDS middleware.
# Works with any EMR or as a standalone API. No OpenMRS dependency.
#
# Usage:
#   GPU:  docker compose --profile gpu up -d
#   CPU:  docker compose up -d
#
# On first start, all artifacts (~6.6 GB) auto-download from HuggingFace.
# Subsequent starts are instant.
#
# API:
#   POST /cds/generate_stream   — SSE streaming clinical decision support
#   POST /cds/generate          — blocking CDS
#   POST /scribe/process_audio  — audio → structured observations
#   POST /scribe/process        — text → structured observations
#   GET  /api/health            — engine health
# =============================================================================

name: clinicdx-engine

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:

  # ── Knowledge Base Daemon ───────────────────────────────────────────────────
  kb:
    build:
      context: .
      dockerfile: docker/kb/Dockerfile
    image: ghcr.io/brookyale0512/clinicdx-kb:latest
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "200m"
        max-file: "10"
    volumes:
      - kb_data:/kb_data
      - hf_cache:/hf_cache
    environment:
      KB_PORT: "4276"
      KB_SEARCH_MODE: "${KB_SEARCH_MODE:-rrf}"
      KB_K: "${KB_K:-5}"
      KB_SNIPPET_CHARS: "${KB_SNIPPET_CHARS:-15000}"
      KB_THRESHOLD: "0.0"
      KB_DATA_DIR: "/kb_data"
      KB_INDEX_PATH: "/kb_data/who_knowledge_vec_v2.mv2"
      EMBED_MODEL_PATH: "/hf_cache/embeddinggemma-300m"
      HF_KB_REPO: "${HF_KB_REPO:-ClinicDx1/ClinicDx}"
      HF_TOKEN: "${HF_TOKEN:-}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    networks:
      - engine-internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4276/health"]
      interval: 15s
      timeout: 5s
      start_period: 120s
      retries: 5

  # ── Model Server (llama-server, GPU) ────────────────────────────────────────
  model-gpu:
    build:
      context: .
      dockerfile: docker/model/Dockerfile.gpu
    image: ghcr.io/brookyale0512/clinicdx-model-gpu:latest
    profiles: ["gpu"]
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - model_data:/gguf_data
    environment:
      MODEL_PORT: "8180"
      N_GPU_LAYERS: "${N_GPU_LAYERS:-999}"
      MODEL_CTX: "${MODEL_CTX:-8192}"
      MODEL_PARALLEL: "${MODEL_PARALLEL:-1}"
      MODEL_THREADS: "${MODEL_THREADS:-8}"
      GGUF_DIR: "/gguf_data"
      HF_MODEL_REPO: "${HF_MODEL_REPO:-ClinicDx1/ClinicDx}"
      HF_TOKEN: "${HF_TOKEN:-}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      engine-internal:
        aliases:
          - model
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8180/health"]
      interval: 20s
      timeout: 10s
      start_period: 120s
      retries: 5

  # ── Model Server (llama-server, CPU fallback) ───────────────────────────────
  model-cpu:
    build:
      context: .
      dockerfile: docker/model/Dockerfile.gpu
    image: ghcr.io/brookyale0512/clinicdx-model-gpu:latest
    profiles: ["cpu"]
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - model_data:/gguf_data
    environment:
      MODEL_PORT: "8180"
      N_GPU_LAYERS: "0"
      MODEL_CTX: "${MODEL_CTX:-8192}"
      MODEL_PARALLEL: "1"
      MODEL_THREADS: "${MODEL_THREADS:-8}"
      GGUF_DIR: "/gguf_data"
      HF_MODEL_REPO: "${HF_MODEL_REPO:-ClinicDx1/ClinicDx}"
      HF_TOKEN: "${HF_TOKEN:-}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    networks:
      engine-internal:
        aliases:
          - model
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8180/health"]
      interval: 20s
      timeout: 10s
      start_period: 120s
      retries: 5

  # ── FastAPI Middleware (CDS orchestration + core Scribe) ────────────────────
  middleware:
    build:
      context: .
      dockerfile: docker/middleware/Dockerfile
    image: ghcr.io/brookyale0512/clinicdx-middleware:latest
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${ENGINE_PORT:-8321}:8080"
    environment:
      MODEL_SERVER_URL: "http://model:8180"
      KB_URL: "http://kb:4276"
      MIDDLEWARE_PORT: "8080"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    depends_on:
      kb:
        condition: service_healthy
    networks:
      engine-internal:
        aliases:
          - middleware
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5

volumes:
  kb_data:
    driver: local
  model_data:
    driver: local
  hf_cache:
    driver: local

networks:
  engine-internal:
    driver: bridge
