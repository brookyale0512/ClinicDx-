# CDS KB LoRA — v2 Training Config
# Based on think_v1 (train run 065804, Feb 27 2026) — the successful reference run
# Base: medgemma-4b-it (text-only causal LM, vision frozen)
# Format: [CDS] tag + <think>/<KB_QUERY> XML tool-use
# No loss masking (full-sequence loss, same as think_v1)
#
# Cycle 1: 11,484 train / 600 val (quality-filtered from 13k enriched records)
# Effective batch: 4 × 4 = 16 → ~718 steps for 1 epoch

model:
  name: "/var/www/ClinicDx/model/medgemma-4b-it"
  max_seq_length: 8192
  dtype: "bfloat16"
  load_in_4bit: false
  trust_remote_code: true

vision:
  freeze: true

lora:
  r: 64
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  use_gradient_checkpointing: true

training:
  output_dir: "/var/www/ClinicDx/training/lora_cds_kb_v2/checkpoints"
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  num_train_epochs: 1
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  optim: "adamw_torch"
  bf16: true
  fp16: false
  eval_strategy: "steps"
  eval_steps: 100
  save_strategy: "steps"
  save_steps: 100
  save_total_limit: 5
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  logging_steps: 10
  logging_first_step: true
  early_stopping_patience: 3
  seed: 42
  data_seed: 42

data:
  # Cycle 1: 11,484 train + 600 val — written by prep_cycle1.py
  train_file: "/var/www/ClinicDx/training/lora_cds_kb_v2/data/train.jsonl"
  val_file: "/var/www/ClinicDx/training/lora_cds_kb_v2/data/val.jsonl"
